<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evaluación de Desempeño — Aris Mining</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1A56DB;
    --blue-hover: #1648C0;
    --blue-light: #EBF2FF;
    --blue-mid: #BFCFEE;  
    --blue-dim: rgba(26,86,219,0.08);
    --blue-border: rgba(26,86,219,0.2);
    --bg: #F5F8FF;
    --bg2: #FFFFFF;
    --bg3: #EEF3FC;
    --bg4: #E4ECFA;
    --border: rgba(26,86,219,0.12);
    --border-strong: rgba(26,86,219,0.25);
    --text: #0F1C3F;
    --text-muted: #5A6A8A;
    --text-dim: #9AAAC8;
    --green: #0E8A4F;
    --green-dim: rgba(14,138,79,0.09);
    --red: #C0392B;
    --red-dim: rgba(192,57,43,0.09);
    --amber: #B45309;
    --amber-dim: rgba(180,83,9,0.09);
    --accent: #1A56DB;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  .header {
    background: var(--blue);
    border-bottom: none;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(26,86,219,0.18);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-img {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }
  .header-code { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); }

  /* ── SCORE BAR (sticky BOTTOM) ── */
  .score-strip {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 99;
    box-shadow: 0 -2px 12px rgba(26,86,219,0.12);
    transition: all 0.3s;
  }
  .score-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .score-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--blue);
    transition: color 0.4s;
    min-width: 60px;
  }
  .score-bar-wrap { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; max-width: 400px; }
  .score-bar { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s; }
  .concepto-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.4s;
    white-space: nowrap;
  }
  .tipo-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 16px; font-weight: 500;
    transition: all 0.4s;
    flex-shrink: 0;
  }
  .score-hint { font-size: 11px; color: var(--text-dim); margin-left: auto; white-space: nowrap; }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px 40px; }

  /* ── CARD WRAP ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(26,86,219,0.05);
  }

  /* ── TYPE SELECTOR ── */
  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 0; }
  .type-btn {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .type-btn:hover { border-color: var(--blue-border); background: var(--blue-light); }
  .type-btn.active { border-color: var(--blue); background: var(--blue-dim); box-shadow: 0 0 0 3px rgba(26,86,219,0.08); }
  .type-btn-code { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .type-btn-label { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .type-btn.active .type-btn-label { color: var(--blue); }
  .type-btn.active .type-btn-code { color: var(--blue); opacity: 0.7; }

  /* ── PROVEEDOR INFO ── */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0; }
  .info-grid.full { grid-template-columns: 1fr; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; font-weight: 500; }
  .field-group input, .field-group select {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field-group input:focus, .field-group select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
  }
  .field-group input::placeholder { color: var(--text-dim); }
  .field-group select option { background: #fff; color: var(--text); }

  /* OC chips */
  .oc-wrap { display: flex; flex-direction: column; gap: 8px; }
  .oc-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 20px; }
  .oc-chip {
    background: var(--blue-light);
    border: 1px solid var(--blue-border);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--blue);
    display: flex; align-items: center; gap: 6px;
    cursor: default;
  }
  .oc-chip-remove { cursor: pointer; color: var(--blue); font-size: 14px; line-height: 1; opacity: 0.5; }
  .oc-chip-remove:hover { color: var(--red); opacity: 1; }
  .oc-add { display: flex; gap: 8px; }
  .oc-add input {
    flex: 1;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .oc-add input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
  .btn-add {
    background: var(--blue);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--blue-hover); }

  /* ── CRITERIOS CON BOTONES 1-5 ── */
  .criterios-wrap { margin-bottom: 0; }
  .criterios-header {
    display: grid;
    grid-template-columns: 28px 1fr 60px 200px;
    gap: 12px;
    padding: 8px 14px;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .criterio-row {
    display: grid;
    grid-template-columns: 28px 1fr 60px 200px;
    gap: 12px;
    align-items: center;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    background: var(--bg3);
    transition: border-color 0.2s, background 0.2s;
  }
  .criterio-row:hover { border-color: var(--blue-border); background: var(--blue-light); }
  .criterio-row.rated { background: #EBF2FF; border-color: rgba(26,86,219,0.2); }
  .criterio-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); text-align: center; }
  .criterio-name { font-size: 13px; color: var(--text); }
  .criterio-pond {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--blue);
    text-align: center;
    font-weight: 500;
  }

  /* ── BOTONES 1–5 ── */
  .rating-btns {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .rating-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg2);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .rating-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--blue-light);
  }
  .rating-btn.selected-1 { background: var(--red-dim);   border-color: var(--red);   color: var(--red);   }
  .rating-btn.selected-2 { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .rating-btn.selected-3 { background: var(--blue-light); border-color: var(--blue); color: var(--blue);  }
  .rating-btn.selected-4 { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .rating-btn.selected-5 { background: #EBF2FF;          border-color: #1A56DB;      color: #1A56DB;      }

  /* ── OBSERVACIONES ── */
  .obs-wrap { margin-bottom: 0; }
  textarea {
    width: 100%;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
  textarea::placeholder { color: var(--text-dim); }

  /* ── SUBMIT ── */
  .submit-row { display: flex; justify-content: flex-end; gap: 12px; padding-top: 10px; }
  .btn-secondary {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--blue-border); color: var(--blue); }
  .btn-primary {
    background: var(--blue);
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    box-shadow: 0 2px 8px rgba(26,86,219,0.25);
  }
  .btn-primary:hover { background: var(--blue-hover); box-shadow: 0 4px 14px rgba(26,86,219,0.35); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* color states */
  .state-E { color: var(--red); }
  .state-D { color: var(--amber); }
  .state-C { color: var(--blue); }
  .state-B { color: var(--green); }
  .state-A { color: #0D6EFD; }

  .badge-E { background: var(--red-dim); color: var(--red); border: 1px solid rgba(192,57,43,0.25); }
  .badge-D { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(180,83,9,0.25); }
  .badge-C { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-border); }
  .badge-B { background: var(--green-dim); color: var(--green); border: 1px solid rgba(14,138,79,0.25); }
  .badge-A { background: #EBF2FF; color: #1A56DB; border: 1px solid rgba(26,86,219,0.35); }

  .bar-E { background: var(--red); }
  .bar-D { background: var(--amber); }
  .bar-C { background: var(--blue); }
  .bar-B { background: var(--green); }
  .bar-A { background: #1A56DB; }

  @media (max-width: 640px) {
    .type-selector { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .criterios-header, .criterio-row {
      grid-template-columns: 24px 1fr 40px;
      gap: 8px;
    }
    .criterio-row { grid-template-rows: auto auto; }
    .rating-btns { grid-column: 1 / 4; }
    .rating-btn { width: 30px; height: 30px; font-size: 12px; }
    .score-strip { flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
    .score-bar-wrap { max-width: 100%; order: 3; }
    .score-hint { display: none; }
    .header { padding: 0 16px; }
    .main { padding: 20px 16px 120px; }
  }
</style>
</head>

<script>
const TIPOS = {
  servicios: {
    label: 'Servicios u obras',
    codigo: 'F-COM-007',
    criterios: [
      { nombre: 'Calidad', pond: 25 },
      { nombre: 'Cumplimiento de plazos', pond: 20 },
      { nombre: 'Idoneidad del personal clave', pond: 10 },
      { nombre: 'Seguridad, salud y medio ambiente', pond: 10 },
      { nombre: 'Cumplimiento laboral', pond: 10 },
      { nombre: 'Cumplimiento social', pond: 5 },
      { nombre: 'Infraestructura, equipos y herramientas', pond: 5 },
      { nombre: 'Suministro de materiales', pond: 5 },
      { nombre: 'Cumplimiento administrativo', pond: 5 },
      { nombre: 'Cumplimiento legal y de seguros', pond: 5 },
    ]
  },
  consultoria: {
    label: 'Consultoría',
    codigo: 'F-COM-016',
    criterios: [
      { nombre: 'Calidad', pond: 30 },
      { nombre: 'Cumplimiento de plazos', pond: 30 },
      { nombre: 'Idoneidad del personal clave', pond: 30 },
      { nombre: 'Cumplimiento administrativo', pond: 5 },
      { nombre: 'Cumplimiento legal y de seguros', pond: 5 },
    ]
  },
  bienes: {
    label: 'Bienes',
    codigo: 'F-COM-008',
    criterios: [
      { nombre: 'Condiciones comerciales', pond: 10 },
      { nombre: 'Calidad', pond: 35 },
      { nombre: 'Oportunidad y completitud', pond: 35 },
      { nombre: 'Servicio post-venta', pond: 10 },
      { nombre: 'Documentación', pond: 10 },
    ]
  }
};

const RANGOS = [
  { min: 4.5,  max: 5.0,  concepto: 'EXCELENTE',       tipo: 'A' },
  { min: 3.5,  max: 4.49, concepto: 'BUENO',           tipo: 'B' },
  { min: 2.5,  max: 3.49, concepto: 'ACEPTABLE',       tipo: 'C' },
  { min: 1.5,  max: 2.49, concepto: 'DEFICIENTE',      tipo: 'D' },
  { min: 0,    max: 1.49, concepto: 'MUY DEFICIENTE',  tipo: 'E' },
];

let tipoActual = 'servicios';
let notas = {};
let ocs = [];

function getConcepto(score) {
  if (score === null || score < 0) return null;
  for (const r of RANGOS) {
    if (score >= r.min && score <= r.max) return r;
  }
  return RANGOS[4];
}

function calcularTotal() {
  const criterios = TIPOS[tipoActual].criterios;
  let totalPond = 0, weightedSum = 0;
  
  for (const c of criterios) {
    const n = notas[c.nombre];
    if (n != null) {
      weightedSum += n * c.pond;
      totalPond += c.pond;
    }
  }
  
  if (totalPond === 0) return null;
  
  const score = weightedSum / totalPond;
  return Math.round(score * 100) / 100;
}

function updateScore() {
  const score = calcularTotal();
  const numEl = document.getElementById('scoreNum');
  const barEl = document.getElementById('scoreBar');
  const concEl = document.getElementById('conceptoBadge');
  const tipoEl = document.getElementById('tipoBadge');

  if (score === null) {
    numEl.textContent = '—';
    numEl.className = 'score-value';
    barEl.style.width = '0%';
    barEl.className = 'score-bar';
    concEl.style.opacity = '0';
    tipoEl.style.opacity = '0';
    return;
  }

  const res = getConcepto(score);
  const pct = Math.max(0, Math.min(100, ((score - 1) / 4) * 100));
  
  numEl.textContent = score.toFixed(2);
  numEl.className = `score-value state-${res.tipo}`;
  barEl.style.width = pct.toFixed(1) + '%';
  barEl.className = `score-bar bar-${res.tipo}`;
  concEl.textContent = res.concepto;
  concEl.className = `concepto-badge badge-${res.tipo}`;
  concEl.style.opacity = '1';
  tipoEl.textContent = res.tipo;
  tipoEl.className = `tipo-badge badge-${res.tipo}`;
  tipoEl.style.opacity = '1';
}

function renderCriterios() {
  const criterios = TIPOS[tipoActual].criterios;
  document.getElementById('criteriosTitle').textContent =
    `Criterios de evaluación — ${TIPOS[tipoActual].label}`;
  const list = document.getElementById('criteriosList');
  list.innerHTML = '';
  
  criterios.forEach((c, i) => {
    const notaActual = notas[c.nombre] || null;
    
    const row = document.createElement('div');
    row.className = `criterio-row${notaActual ? ' rated' : ''}`;
    row.id = `row-${i}`;

    // Build rating buttons HTML
    let botonesHTML = '';
    for (let v = 1; v <= 5; v++) {
      const isSelected = notaActual === v;
      const selClass = isSelected ? ` selected-${v}` : '';
      botonesHTML += `<button class="rating-btn${selClass}" onclick="setNota('${c.nombre}', ${v}, ${i})">${v}</button>`;
    }
    
    row.innerHTML = `
      <span class="criterio-num">${i+1}</span>
      <span class="criterio-name">${c.nombre}</span>
      <span class="criterio-pond">${c.pond}%</span>
      <div class="rating-btns">${botonesHTML}</div>
    `;
    list.appendChild(row);
  });
}

function setNota(nombre, valor, idx) {
  notas[nombre] = valor;

  // Update row styling
  const row = document.getElementById(`row-${idx}`);
  if (row) row.className = 'criterio-row rated';

  // Update button states
  const btns = row.querySelectorAll('.rating-btn');
  btns.forEach((btn, i) => {
    const v = i + 1;
    btn.className = v === valor ? `rating-btn selected-${v}` : 'rating-btn';
  });

  updateScore();
}

function setTipo(tipo) {
  tipoActual = tipo;
  notas = {};
  ['servicios','consultoria','bienes'].forEach(t => {
    document.getElementById(`btn-${t}`).classList.toggle('active', t === tipo);
  });
  renderCriterios();
  updateScore();
}

function addOC() {
  const input = document.getElementById('ocInput');
  const val = input.value.trim().toUpperCase();
  if (!val || ocs.includes(val)) { input.value = ''; return; }
  ocs.push(val);
  renderOCs();
  input.value = '';
}

function removeOC(oc) {
  ocs = ocs.filter(o => o !== oc);
  renderOCs();
}

function renderOCs() {
  const list = document.getElementById('ocList');
  list.innerHTML = ocs.map(oc =>
    `<div class="oc-chip">${oc}<span class="oc-chip-remove" onclick="removeOC('${oc}')">×</span></div>`
  ).join('');
}

function resetForm() {
  notas = {};
  ocs = [];
  renderOCs();
  renderCriterios();
  updateScore();
  document.getElementById('provNombre').value = '';
  document.getElementById('provNIT').value = '';
  document.getElementById('provPeriodo').value = '';
  document.getElementById('provOperacion').value = '';
  document.getElementById('observaciones').value = '';
}

async function enviarEvaluacion() {
  const nombre = document.getElementById('provNombre').value.trim();
  const nit = document.getElementById('provNIT').value.trim();
  const periodo = document.getElementById('provPeriodo').value;
  const operacion = document.getElementById('provOperacion').value; 
  const score = calcularTotal();
  if (!nombre || !nit || !periodo || !operacion) {
    alert('Por favor completa los datos del proveedor, período y operación.');
    return;
  }
  if (score === null) {
    alert('Por favor califica al menos un criterio.');
    return;
  }
  const res = getConcepto(score);
  try {
    const response = await fetch('/api/guardar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        proveedor_nombre: nombre,
        nit: nit,
        periodo: periodo,
        operacion: operacion,
        tipo: tipoActual,
        contratos: ocs,
        calificacion_total: score,
        concepto: res.concepto,
        tipo_calificacion: res.tipo,
        criterios: notas,
        observaciones: document.getElementById('observaciones').value
      })
    });
    
    const result = await response.json();
    if (result.success) {
      alert(`✅ ${result.message}\nID: ${result.id}`);
      resetForm();
    } else {
      alert('Error: ' + result.error);
    }
  } catch (error) {
    alert('Sin conexión: ' + error.message);
  }
}

// Init
renderCriterios();
updateScore();
</script>
</body>
</html>
